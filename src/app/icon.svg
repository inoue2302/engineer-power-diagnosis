<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Deep space background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>

  <!-- Nebula glow -->
  <circle cx="16" cy="16" r="14" fill="url(#nebula)" opacity="0.4"/>

  <!-- Energy ring (outer) -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.6"/>

  <!-- Energy ring (inner) -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="#ff6b00" stroke-width="0.8" opacity="0.4" stroke-dasharray="3 2"/>

  <!-- Power core -->
  <circle cx="16" cy="16" r="4.5" fill="url(#core)"/>
  <circle cx="16" cy="16" r="3" fill="#0a0a0a" opacity="0.5"/>

  <!-- Power reading -->
  <text x="16" y="18" text-anchor="middle" font-family="monospace" font-size="5" font-weight="bold" fill="#39ff14" opacity="0.95">戦</text>

  <!-- Stars -->
  <circle cx="5" cy="5" r="0.5" fill="#fff" opacity="0.8"/>
  <circle cx="27" cy="8" r="0.4" fill="#fff" opacity="0.6"/>
  <circle cx="8" cy="26" r="0.3" fill="#fff" opacity="0.7"/>
  <circle cx="25" cy="24" r="0.5" fill="#fff" opacity="0.5"/>
  <circle cx="3" cy="16" r="0.3" fill="#fff" opacity="0.4"/>
  <circle cx="29" cy="17" r="0.4" fill="#fff" opacity="0.6"/>

  <defs>
    <radialGradient id="nebula" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#ff6b00" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ff9500" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b00"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff6b00"/>
    </linearGradient>
    <radialGradient id="core" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="60%" stop-color="#ff6b00"/>
      <stop offset="100%" stop-color="#ff4500"/>
    </radialGradient>
  </defs>
</svg>
